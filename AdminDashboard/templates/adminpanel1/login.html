<!doctype html>
<html>
  <head>
    {% load static %}
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{% static 'adminpanel1/css/admin.css' %}" />
  </head>
  <body>
    <div class="wrap">
      <div class="login-card">
        <div class="brand">
          <img
            src="{% static 'adminpanel1/images/sechacademy.jpg' %}"
            alt="Sech Academy Logo"
          />
        </div>
        <h1>Sech-academy Reporting Sytem</h1>
        <p class="sub-header">Admin Portal Login</p>

        {% if error_message %}
        <p class="error-msg">{{ error_message }}</p>
        {% endif %}

        <form method="POST" class="login-form" id="admin-login-form" autocomplete="off">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next_url }}" />
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="off" required />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
          />

          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>
    <script>
      (function () {
        var form = document.getElementById('admin-login-form');
        if (!form) return;
        form.reset();
        window.addEventListener('pageshow', function (event) {
          // After login/logout, CSRF token rotates. Reload bfcache restores to avoid stale token submit.
          if (event.persisted) {
            window.location.reload();
            return;
          }
          form.reset();
        });
      })();
    </script>
  </body>
</html>
